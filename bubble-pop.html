<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop</title>
    <link rel="stylesheet" href="pop.css">
</head>
<body>
    <h4>developed by <a href="https://instagram.com/juandiegocr" target="_blank" style="text-decoration: underline; color: inherit;"><strong>@juandiegocr</strong></a></h4>   
    
    <div id="gameContainer">
        <div id="score">0</div>
        <div id="lives">♥︎♥︎♥︎</div>
        <div id="gameOverScreen">
            <h2>Game Over!</h2>
            <p id="finalScore"></p>
            <p id="highScore"></p>
            <div id="playAgain" onclick="startGame()">Play Again</div>
        </div>
        <div id="popButton" onclick="startGame()">Pop!</div>
    </div>

    <div id="themeToggle" onclick="toggleTheme()">☾</div>

    <script src="pop.js"></script>
</body>
</html>
