<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: #ffffff;
            color: #000000;
        }
        
        h2 {
            margin-bottom: 60px;
        }
        
        h4 {
            position: fixed;
            font-size: 14px;
            bottom: 0;
            left: 50%;         /* Moves the element to the center horizontally */
            transform: translateX(-50%);  /* Adjusts the element to be exactly centered */
            text-align: center;
            width: 100%;       /* Optional: if you want it to span the full width */
        }

        [data-theme="dark"] {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        [data-theme="dark"] .bubble {
            filter: invert(1); /* Invert the color of the SVG in dark mode */
        }

        [data-theme="dark"] .score-pop {
            color: #ffffff;
        }

        /* Game Container */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Bubble Styles */
        .bubble {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: block;
            z-index: 1;
            user-select: none; /* Prevent text selection */
            width: 50px; /* Default size, will be overridden by JavaScript */
            height: 50px; /* Default size, will be overridden by JavaScript */
        }

        .bubble.popped {
            animation: pop 0.1s forwards;
        }

        .bubble.crashed {
            animation: pop 0.2s forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Score Pop Animation */
        .score-pop {
            position: absolute;
            color: #333;
            font-size: 24px;
            animation: floatUp 0.5s ease-out;
            z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }

        /* Confetti Animation */
        .confetti {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #ffd700;
            animation: confetti 2s linear forwards;
            z-index: 1;
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        #score {
            position: fixed;
            font-size: 54px;
            bottom: 50%;
            left: 50%;         /* Moves the element to the center horizontally */
            transform: translateX(-50%);  /* Adjusts the element to be exactly centered */
            text-align: center;
            width: 100%;       /* Optional: if you want it to span the full width */
            display: none;     /* Hidden by default */
        }

        #lives {
            right: 20px;
            position: fixed;
            top: 20px;
            font-size: 18px;
            z-index: 2;
        }

        /* Light Theme Variables */
        [data-theme="light"] {
            --playAgain-bg-light: #333; /* Light background color */
            --playAgain-color-light: white; /* Light text color */
            --popButton-bg-light: #333; /* Light background color for pop button */
            --popButton-color-light: white; /* Light text color for pop button */
        }

        /* Dark Theme Variables */
        [data-theme="dark"] {
            --playAgain-bg-dark: white; /* Dark background color */
            --playAgain-color-dark: #333; /* Dark text color */
            --popButton-bg-dark: white; /* Dark background color for pop button */
            --popButton-color-dark: #333; /* Dark text color for pop button */
        }

        /* Game Over Screen */
        @keyframes gameOverAnimation {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #gameOverScreen {
            display: none;
            position: fixed;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: transparent;
            color: var(--gameOverTextColor-light);
            padding: 20px;
            border-radius: 20px;
            border-width: 2px;
            border-style: solid;
            opacity: 0; /* Ensure it starts hidden */
        }

        /* Dark mode styling */
        [data-theme="dark"] #gameOverScreen {
            color: var(--gameOverTextColor-dark);
        }

        #playAgain {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--playAgain-bg-light); /* Use variable */
            color: var(--playAgain-color-light); /* Use variable */
            cursor: pointer;
            border-radius: 100px;
        }

        [data-theme="dark"] #playAgain {
            background-color: var(--playAgain-bg-dark); /* Dark theme background */
            color: var(--playAgain-color-dark); /* Dark theme text color */
        }

        /* Pop Button */
        #popButton {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 45px 30px;
            background-color: var(--popButton-bg-light); /* Light theme background */
            color: var(--popButton-color-light); /* Light theme text color */
            font-size: 20px;
            cursor: pointer;
            border-radius: 100px;
            display: block;
            z-index: 2;
        }

        [data-theme="dark"] #popButton {
            background-color: var(--popButton-bg-dark); /* Dark theme background */
            color: var(--popButton-color-dark); /* Dark theme text color */
        }

        /* Theme Toggle */
        #themeToggle {
            position: fixed;
            top: 17px;
            left: 20px;
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
        }
    </style>
</head>
<body>
    <h4>developed by <a href="https://instagram.com/juandiegocr" target="_blank" style="text-decoration: underline; color: inherit;"><strong>@juandiegocr</strong></a></h4>   
    
    <div id="gameContainer">
        <div id="score">0</div>
        <div id="lives">♥︎♥︎♥︎</div>
        <div id="gameOverScreen">
            <h2>Game Over!</h2>
            <p id="finalScore"></p>
            <p id="highScore"></p>
            <div id="playAgain" onclick="startGame()">Play Again</div>
        </div>
        <div id="popButton" onclick="startGame()">Pop!</div>
    </div>

    <div id="themeToggle" onclick="toggleTheme()">☾</div>

    <script>
        // Game State Variables
        let score = 0;
        let lives = 3;
        let bubbles = [];
        let gameActive = false;
        let highestScore = localStorage.getItem('bubbleHighScore') || 0;
        let lastPopPosition = { x: 0, y: 0 };

        // Create a new bubble
        function createBubble() {
            const minSize = 45;
            const maxSize = 90;
            const size = Math.random() * (maxSize - minSize) + minSize;

            const margin = 100;
            let x, y;
            do {
                x = margin + Math.random() * (window.innerWidth - size - 2 * margin);
                y = margin + Math.random() * (window.innerHeight - size - 2 * margin);
            } while (Math.abs(x - lastPopPosition.x) < 200 && Math.abs(y - lastPopPosition.y) < 200);

            const bubble = document.createElement('img');
            bubble.className = 'bubble';
            bubble.src = "data:image/svg+xml;base64,PHN2ZyBlbmFibGUtYmFja2dyb3VuZD0ibmV3IDAgMCAzMCAzMCIgaGVpZ2h0PSIzMHB4IiBpZD0ic3F1YXJlX2ljb25zIiB2ZXJzaW9uPSIxLjEiIHZpZXdCb3g9IjAgMCAzMCAzMCIgd2lkdGg9IjMwcHgiIHhtbDpzcGFjZT0icHJlc2VydmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgeG1sbnM6eGxpbms9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkveGxpbmsiPjxwYXRoIGNsaXAtcnVsZT0iZXZlbm9kZCIgZD0iTTE1LDAuMUM2LjgsMC4xLDAuMSw2LjgsMC4xLDE1YzAsOC4yLDYuNywxNC45LDE0LjksMTQuOSAgYzguMiwwLDE0LjktNi43LDE0LjktMTQuOUMzMCw2LjgsMjMuMiwwLjEsMTUsMC4xeiBNMTUsMjYuOUM4LjQsMjYuOSwzLjEsMjEuNiwzLjEsMTVDMy4xLDguNCw4LjQsMy4xLDE1LDMuMSAgYzYuNiwwLDExLjksNS4zLDExLjksMTEuOUMyNi45LDIxLjYsMjEuNiwyNi45LDE1LDI2Ljl6IE0xNiw2LjFjNC41LDIuNyw2LjQsMTIuOSwwLDE3LjljMy4yLDAsNy45LTQsNy45LTguOSAgQzIzLjksMTAuMSwxOS45LDYuMSwxNiw2LjF6IiBmaWxsPSIjMjExQTE2IiBmaWxsLXJ1bGU9ImV2ZW5vZGQiLz48L3N2Zz4=";
            bubble.style.width = ${size}px;
            bubble.style.height = ${size}px;

            // Add random rotation to the bubble
            const rotation = Math.random() * 360; // Random rotation between 0 and 360 degrees
            bubble.style.transform = rotate(${rotation}deg);

            const speed = 1 + Math.floor(score / 20) * 0.4;
            const angle = Math.random() * Math.PI * 2;
            bubble.dx = Math.cos(angle) * speed;
            bubble.dy = Math.sin(angle) * speed;

            bubble.style.left = ${x}px;
            bubble.style.top = ${y}px;

            bubble.addEventListener('click', handleBubbleClick);
            document.getElementById('gameContainer').appendChild(bubble);
            bubbles.push(bubble);
        }

        // Handle bubble click
        function handleBubbleClick(e) {
            if (!gameActive) return;
            lastPopPosition = { x: e.clientX, y: e.clientY };

            const bubbleSize = parseFloat(e.target.style.width);
            const minSize = 40;
            const maxSize = 80;

            const dynamicScore = Math.max(1, Math.floor((maxSize - bubbleSize) / (maxSize - minSize) * 9));

            const scorePop = document.createElement('div');
            scorePop.className = 'score-pop';
            scorePop.textContent = +${dynamicScore};
            scorePop.style.left = ${e.clientX}px;
            scorePop.style.top = ${e.clientY}px;
            document.getElementById('gameContainer').appendChild(scorePop);
            setTimeout(() => scorePop.remove(), 500);

            e.target.classList.add('popped');
            setTimeout(() => {
                e.target.remove();
                bubbles = bubbles.filter(b => b !== e.target);
            }, 200);

            score += dynamicScore;
            document.getElementById('score').textContent = ${score};
            createBubble();
        }

        // Update game state
        function updateGame() {
            if (!gameActive) return;

            bubbles.forEach((bubble, index) => {
                const rect = bubble.getBoundingClientRect();
                let x = parseFloat(bubble.style.left) + bubble.dx;
                let y = parseFloat(bubble.style.top) + bubble.dy;

                if (x < 0 || x > window.innerWidth - rect.width || y < 0 || y > window.innerHeight - rect.height) {
                    bubble.classList.add('crashed');
                    setTimeout(() => {
                        if (bubble.parentNode) {
                            bubble.remove();
                            bubbles.splice(index, 1);
                            loseLife();
                        }
                    }, 200);
                    return;
                }

                bubble.style.left = ${x}px;
                bubble.style.top = ${y}px;
            });

            requestAnimationFrame(updateGame);
        }

        // Lose a life
        function loseLife() {
            lives--;
            document.getElementById('lives').textContent = '♥︎'.repeat(lives) + '♡'.repeat(3 - lives);

            if (lives <= 0) {
                endGame();
            } else {
                createBubble();
            }
        }

        // Start the game
        function startGame() {
            score = 0;
            lives = 3;
            gameActive = true;
            document.getElementById('score').textContent = ${score};
            document.getElementById('lives').textContent = '♥︎♥︎♥︎';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('popButton').style.display = 'none';
            document.getElementById('score').style.display = 'block'; // Show score during gameplay
            document.getElementById('lives').style.display = 'block';
            bubbles.forEach(b => b.remove());
            bubbles = [];
            createBubble();
            updateGame();
        }

        // End the game
        function endGame() {
            gameActive = false;
            let gameOverScreen = document.getElementById('gameOverScreen');
            gameOverScreen.style.display = 'block';
            gameOverScreen.style.animation = 'gameOverAnimation 0.3s ease-out forwards';

            
            document.getElementById('highScore').textContent = High Score: ${highestScore};
            if (score > highestScore) {
                highestScore = score;
                localStorage.setItem('bubbleHighScore', highestScore);
            }
        }

        // Toggle theme
        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.setAttribute('data-theme', 'light');
                document.getElementById('themeToggle').textContent = '☾';
                document.getElementById('popButton').style.backgroundColor = '#333'; // Light theme: dark background
                document.getElementById('popButton').style.color = '#fff'; // Light theme: light text
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').textContent = '☼';
                document.getElementById('popButton').style.backgroundColor = '#fff'; // Dark theme: light background
                document.getElementById('popButton').style.color = '#333'; // Dark theme: dark text
            }
        }

        // Initialize theme
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('popButton').style.backgroundColor = '#333'; // Default light theme background
        document.getElementById('popButton').style.color = '#fff'; // Default light theme text

        // Error handling
        window.onerror = function (message, source, lineno, colno, error) {
            startGame(); // Restart game on error
            return true; // Prevent default error handling
        };
    </script>
</body>
</html>
